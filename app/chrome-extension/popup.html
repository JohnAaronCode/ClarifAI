<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #e5e5e5;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 16px; height: 16px; }
    .logo-text { font-size: 15px; font-weight: 700; color: #fff; }
    .logo-sub { font-size: 10px; color: #555; margin-top: 1px; }

    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .tab {
      flex: 1; padding: 10px;
      font-size: 12px; font-weight: 500;
      text-align: center; cursor: pointer;
      color: #666; border: none;
      background: transparent;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

    .panel { display: none; padding: 16px; }
    .panel.active { display: block; }

    /* Current Page Panel */
    .page-info {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .page-url {
      font-size: 11px; color: #555;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .page-title {
      font-size: 13px; font-weight: 500;
      color: #e5e5e5; margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .btn-primary {
      width: 100%;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      padding: 11px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #1a2f5a; color: #4a6fa5; cursor: not-allowed; }

    /* Manual Input Panel */
    textarea, input[type="text"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      color: #e5e5e5;
      resize: vertical;
      font-family: inherit;
      margin-bottom: 10px;
    }
    textarea { min-height: 100px; }
    textarea::placeholder, input::placeholder { color: #444; }
    textarea:focus, input:focus {
      outline: none;
      border-color: rgba(59,130,246,0.5);
    }

    /* Results */
    .result-card {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 14px;
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .verdict-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .verdict-badge {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
    }
    .verdict-REAL { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .verdict-FAKE { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .verdict-UNVERIFIED { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .confidence { font-size: 13px; color: #666; }

    .result-explanation {
      font-size: 12px;
      color: #a0a0a0;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .fill-REAL { background: #34d399; }
    .fill-FAKE { background: #f87171; }
    .fill-UNVERIFIED { background: #fbbf24; }

    .open-full-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .open-full-btn:hover { background: rgba(255,255,255,0.05); color: #e5e5e5; }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px 0;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #555; }

    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #f87171;
      margin-top: 12px;
    }

    /* History Panel */
    .history-item {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-item:hover { border-color: rgba(255,255,255,0.15); }
    .history-preview {
      font-size: 12px; color: #a0a0a0;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; margin-top: 4px;
    }
    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .history-time { font-size: 10px; color: #444; }
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #444;
      font-size: 13px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
    }
    .settings-label { color: #a0a0a0; }
    .settings-value { color: #555; font-size: 12px; }
    .server-input {
      width: 100%;
      margin-top: 8px;
    }
    .save-btn {
      width: 100%;
      margin-top: 10px;
      background: #1a2f5a;
      color: #3b82f6;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 8px;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-btn:hover { background: #1e3a6e; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">ClarifAI</div>
      <div class="logo-sub">News Credibility Analyzer</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('page')">Current Page</button>
    <button class="tab" onclick="switchTab('manual')">Manual Input</button>
    <button class="tab" onclick="switchTab('history')">History</button>
    <button class="tab" onclick="switchTab('settings')">Settings</button>
  </div>

  <!-- CURRENT PAGE -->
  <div id="tab-page" class="panel active">
    <div class="page-info">
      <div class="page-url" id="current-url">Loading...</div>
      <div class="page-title" id="current-title">Loading page...</div>
    </div>
    <button class="btn-primary" id="analyze-page-btn" onclick="analyzeCurrentPage()">
      Analyze This Page
    </button>
    <div id="page-result"></div>
  </div>

  <!-- MANUAL INPUT -->
  <div id="tab-manual" class="panel">
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button id="mode-text" onclick="setMode('text')"
        style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(59,130,246,0.5);background:rgba(59,130,246,0.1);color:#3b82f6;font-size:12px;cursor:pointer;font-weight:600;">
        Paste Text
      </button>
      <button id="mode-url" onclick="setMode('url')"
        style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#666;font-size:12px;cursor:pointer;">
        Enter URL
      </button>
    </div>
    <textarea id="manual-text" placeholder="Paste news article content here..."></textarea>
    <input type="text" id="manual-url" placeholder="https://example.com/article" style="display:none;">
    <button class="btn-primary" onclick="analyzeManual()">Analyze Credibility</button>
    <div id="manual-result"></div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="panel">
    <div id="history-list"></div>
  </div>

  <!-- SETTINGS -->
  <div id="tab-settings" class="panel">
    <div class="settings-row">
      <span class="settings-label">Server URL</span>
    </div>
    <input type="text" class="server-input" id="server-url-input"
      placeholder="https://your-clarifai.vercel.app">
    <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    <div class="settings-row" style="margin-top:16px">
      <span class="settings-label">Auto-detect news pages</span>
      <input type="checkbox" id="auto-detect" checked>
    </div>
    <div class="settings-row">
      <span class="settings-label">Version</span>
      <span class="settings-value">1.0.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
